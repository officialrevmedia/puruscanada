<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Purus Building Maintenance</title>
<meta name="robots" content="noindex">
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Figtree:wght@400;600&display=swap" rel="stylesheet">
<style>
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#F4F6F8;color:#021830;font-family:'Figtree',sans-serif;text-align:center;padding:24px}
  h1{font-family:'Marcellus',serif;font-size:clamp(40px,8vw,72px);margin:0 0 8px;color:#03244D}
  p{color:#4E5E6F;max-width:420px;margin:0 auto 28px;line-height:1.6}
  .rule{width:48px;height:1px;background:#B9975B;margin:0 auto 28px}
  a{display:inline-block;background:#B9975B;color:#fff;text-decoration:none;padding:15px 36px;font-size:13px;letter-spacing:.16em;text-transform:uppercase;font-weight:600;transition:background .3s}
  a:hover{background:#a3814a}
</style>
</head>
<body>
<div>
  <h1>404</h1>
  <div class="rule"></div>
  <p>This page has been swept away. Let us take you back to where everything is in its place.</p>
  <a href="/">Return Home</a>
</div>
</body>
</html>
